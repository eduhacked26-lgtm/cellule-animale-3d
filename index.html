
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Laboratoire Cellule 3D Interactif</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:radial-gradient(circle at center,#0b1c2c,#05090f);
color:white;
}

#panel{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:14px;
border-radius:10px;
z-index:10;
}

button{
margin:4px;
padding:8px 12px;
font-size:15px;
border:none;
border-radius:6px;
cursor:pointer;
}

input{width:160px}

#label{
position:absolute;
bottom:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:14px;
border-radius:8px;
font-size:18px;
}

#score{
position:absolute;
bottom:20px;
right:20px;
background:rgba(0,0,0,0.6);
padding:14px;
border-radius:8px;
font-size:18px;
}

#diagram{
position:absolute;
right:10px;
top:10px;
display:none;
background:white;
padding:10px;
border-radius:8px;
}

canvas{display:block;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

<div id="panel">

<button onclick="toggleLang()">FR / عربي</button>
<button onclick="startQuiz()">Quiz</button>
<button onclick="toggleSlice()">Coupe</button>
<button onclick="toggleDiagram()">Schéma</button>

<br><br>

Opacité membrane<br>
<input type="range" min="0.1" max="1" step="0.05" value="0.5" id="opacity">

</div>

<div id="label">Clique sur une structure</div>
<div id="score">Score : 0</div>

<div id="diagram">
<svg width="260" height="260">
<circle cx="130" cy="130" r="110" fill="#c7efff" stroke="black" stroke-width="3"/>
<circle cx="130" cy="130" r="45" fill="violet"/>
<ellipse cx="80" cy="90" rx="18" ry="10" fill="orange"/>
<ellipse cx="180" cy="170" rx="18" ry="10" fill="orange"/>
</svg>
<p style="color:black">Schéma 2D simplifié</p>
</div>

<script>

let scene,camera,renderer,controls;
let membrane,cytoplasm,nucleus;
let mitochondria=[];
let golgi;
let reticulum=[];

let raycaster=new THREE.Raycaster();
let mouse=new THREE.Vector2();

let language="fr";
let quiz=false;
let quizTarget=null;
let score=0;
let slice=false;

init();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z=25;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

controls=new THREE.OrbitControls(camera,renderer.domElement);

const light1=new THREE.PointLight(0xffffff,1);
light1.position.set(6,6,6);
scene.add(light1);

const light2=new THREE.AmbientLight(0x404040);
scene.add(light2);

createCell();

window.addEventListener("click",click);
}

function createCell(){

const memGeo=new THREE.SphereGeometry(2.5,64,64);
const memMat=new THREE.MeshPhongMaterial({
color:0x66ccff,
transparent:true,
opacity:0.5,
side:THREE.DoubleSide
});
membrane=new THREE.Mesh(memGeo,memMat);
scene.add(membrane);

const cytGeo=new THREE.SphereGeometry(2.4,64,64);
const cytMat=new THREE.MeshPhongMaterial({
color:0x55aaff,
transparent:true,
opacity:0.25
});
cytoplasm=new THREE.Mesh(cytGeo,cytMat);
scene.add(cytoplasm);

const nucGeo=new THREE.SphereGeometry(0.9,64,64);
const nucMat=new THREE.MeshPhongMaterial({color:0xaa55ff});
nucleus=new THREE.Mesh(nucGeo,nucMat);
scene.add(nucleus);

for(let i=0;i<10;i++){

const g=new THREE.SphereGeometry(0.25,32,32);
const m=new THREE.MeshPhongMaterial({color:0xff8800});
let mito=new THREE.Mesh(g,m);

mito.position.set(
(Math.random()-0.5)*3,
(Math.random()-0.5)*3,
(Math.random()-0.5)*3
);

scene.add(mito);
mitochondria.push(mito);
}

createGolgi();
createReticulum();
}

function createGolgi(){

const geo=new THREE.TorusGeometry(0.6,0.15,16,60);
const mat=new THREE.MeshPhongMaterial({color:0xff66aa});

golgi=new THREE.Mesh(geo,mat);

golgi.position.set(1,0.5,0);
scene.add(golgi);
}

function createReticulum(){

for(let i=0;i<6;i++){

const geo=new THREE.TorusGeometry(1.2,0.05,8,40);
const mat=new THREE.MeshPhongMaterial({color:0x66ffcc});

let r=new THREE.Mesh(geo,mat);

r.rotation.x=Math.random()*3;
r.rotation.y=Math.random()*3;

scene.add(r);
reticulum.push(r);
}
}

function animate(){

requestAnimationFrame(animate);

/* microscope zoom */

if(camera.position.z>7)
camera.position.z-=0.05;

/* membrane breathing */

let s=1+Math.sin(Date.now()*0.002)*0.02;
membrane.scale.set(s,s,s);

/* mitochondria movement */

mitochondria.forEach((m,i)=>{
m.position.x+=Math.sin(Date.now()*0.001+i)*0.001;
m.position.y+=Math.cos(Date.now()*0.001+i)*0.001;
});

golgi.rotation.y+=0.01;

scene.rotation.y+=0.001;

renderer.render(scene,camera);
}

document.getElementById("opacity").addEventListener("input",function(){
membrane.material.opacity=this.value;
});

function click(event){

mouse.x=(event.clientX/window.innerWidth)*2-1;
mouse.y=-(event.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);

let objects=[membrane,nucleus,cytoplasm,golgi,...mitochondria];

let hits=raycaster.intersectObjects(objects);

if(hits.length>0)
identify(hits[0].object);
}

function identify(o){

let label="";

if(o===membrane)
label=language==="fr"?"Membrane plasmique":"الغشاء البلازمي";

if(o===cytoplasm)
label=language==="fr"?"Cytoplasme":"السيتوبلازم";

if(o===nucleus)
label=language==="fr"?"Noyau":"النواة";

if(o===golgi)
label=language==="fr"?"Appareil de Golgi":"جهاز غولجي";

if(mitochondria.includes(o))
label=language==="fr"?"Mitochondrie":"الميتوكوندريا";

document.getElementById("label").innerHTML="<b>"+label+"</b>";

if(quiz){

if(o===quizTarget){

score++;
document.getElementById("score").innerHTML="Score : "+score;

document.getElementById("label").innerHTML="<b>Correct !</b>";
quiz=false;

}else{

document.getElementById("label").innerHTML="<b>Réessaie</b>";

}
}
}

function toggleLang(){

language = language==="fr" ? "ar" : "fr";

}

function startQuiz(){

quiz=true;

let targets=[membrane,nucleus,cytoplasm,golgi];

quizTarget=targets[Math.floor(Math.random()*targets.length)];

let name="";

if(quizTarget===membrane) name="membrane";
if(quizTarget===nucleus) name="noyau";
if(quizTarget===cytoplasm) name="cytoplasme";
if(quizTarget===golgi) name="Golgi";

document.getElementById("label").innerHTML="Clique sur : <b>"+name+"</b>";
}

function toggleDiagram(){

let d=document.getElementById("diagram");

d.style.display = d.style.display==="none" ? "block" : "none";
}

function toggleSlice(){

slice=!slice;

if(slice){

membrane.scale.x=0.6;

}else{

membrane.scale.x=1;

}
}

</script>

</body>
</html>
